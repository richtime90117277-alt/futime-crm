<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>客戶管理系統</title>
<style>
:root{--navy:#1a365d;--cream:#f8f9fa;--cream2:#f1f3f5;--text:#2d3748;--text-soft:#718096;}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;padding:0;}
body{background:var(--cream);color:var(--text);line-height:1.45;}
#app{max-width:1100px;margin:0 auto;padding:1rem;}
header{margin-bottom:1rem;}
h1{font-size:1.4rem;color:var(--navy);}
.btn{padding:.6rem 1rem;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
.btn-primary{background:#2b6cb0;color:white;}
.btn-secondary{background:#718096;color:white;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:1rem;z-index:999;}
.modal.active{display:flex;}
.modal-box{background:white;border-radius:12px;max-width:720px;width:100%;max-height:90vh;overflow:auto;padding:1.25rem;}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:.75rem;}
.modal-body{margin:1rem 0;}
.modal-actions{display:flex;gap:.75rem;margin-top:1rem;}
.detail-row{display:flex;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--cream2);}
.detail-label{min-width:100px;font-weight:600;color:var(--navy);font-size:.9rem;}
.detail-value{flex:1;font-size:.9rem;}
.form-group{margin-bottom:.75rem;}
.form-group label{font-size:.9rem;font-weight:600;color:var(--navy);margin-bottom:.35rem;display:inline-block;}
.ms-wrap{position:relative;}
.ms-display{border:2px solid #e8edf2;border-radius:8px;padding:.6rem .875rem;background:var(--cream);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.ms-dropdown{position:absolute;left:0;top:100%;width:100%;background:white;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);padding:.5rem;display:none;z-index:10;}
.ms-wrap.active .ms-dropdown{display:block;}
.ms-opt{display:block;padding:.4rem .5rem;cursor:pointer;font-size:.9rem;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#2d3748;color:white;padding:.75rem 1.25rem;border-radius:8px;display:none;z-index:9999;}
.toast.show{display:block;}
</style>
</head>
<body>
<div id="app">
<header><h1>客戶管理系統</h1></header>
<div style="margin-bottom:1rem;"><button class="btn btn-primary" onclick="goAdd()">新增客戶</button></div>
<div id="customerList" style="display:grid;gap:.75rem;"></div>
</div>

<div id="detailModal" class="modal">
<div class="modal-box">
<div class="modal-title" id="modalTitle"></div>
<div class="modal-body" id="modalBody"></div>
<div class="modal-actions" id="modalActions"></div>
</div>
</div>

<div id="editModal" class="modal">
<div class="modal-box">
<div class="modal-title">編輯客戶資料</div>
<div class="modal-body" id="editModalBody"></div>
<div class="modal-actions">
<button class="btn btn-secondary" onclick="closeEdit()">取消</button>
<button class="btn btn-primary" id="editSaveBtn">儲存更新</button>
</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
const STAGE_NAMES = ['初期','信任','需求','產品','異議','成交','售後','轉介'];
let currentUser = '業務A';
let currentRole = 'manager';
let customers = [];

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function closeDetail(){
  document.getElementById('detailModal').classList.remove('active');
}
function closeEdit(){
  document.getElementById('editModal').classList.remove('active');
}

function renderList(){
  const list = document.getElementById('customerList');
  list.innerHTML = '';
  if(!customers || !customers.length){
    list.innerHTML = '<div style="padding:1rem;background:white;border-radius:8px;">暫無客戶</div>';
    return;
  }
  customers.forEach(c=>{
    const item = document.createElement('div');
    item.style.background='white';
    item.style.borderRadius='8px';
    item.style.padding='1rem';
    item.style.cursor='pointer';
    item.innerHTML = `<div style="font-weight:600;">${c.customerName||'未命名'}</div>
    <div style="font-size:.85rem;color:var(--text-soft);">${c.contactInfo||''} ${c.salesPerson||''}</div>`;
    item.onclick = ()=>showDetail(c.id);
    list.appendChild(item);
  });
}

function showDetail(id){
  try{
    const sid = String(id||'');
    const c = customers.find(x=>x&&x.id&&String(x.id)===sid);
    if(!c){showToast('找不到客戶');return;}
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalActions = document.getElementById('modalActions');
    modalTitle.textContent = c.customerName;
    modalBody.innerHTML = `<div class="detail-row"><div class="detail-label">負責業務</div><div class="detail-value">${c.salesPerson||''}</div></div>
<div class="detail-row"><div class="detail-label">聯絡方式</div><div class="detail-value">${c.contactInfo||''}</div></div>`;
    modalActions.innerHTML = '';
    const canEdit = currentRole==='manager' || c.salesPerson===currentUser;
    if(canEdit){
      const editBtn = document.createElement('button');
      editBtn.className='btn btn-secondary';
      editBtn.textContent='編輯';
      editBtn.onclick=()=>showEdit(c.id);
      modalActions.appendChild(editBtn);
    }
    document.getElementById('detailModal').classList.add('active');
  }catch(err){
    showToast('載入詳情失敗');
    console.error(err);
  }
}

function showEdit(id){
  try{
    const sid = String(id||'');
    const c = customers.find(x=>x&&x.id&&String(x.id)===sid);
    if(!c){showToast('找不到客戶');return;}
    closeDetail();
    function esc(v){return (v||'').toString().replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    const html = `<div style="display:grid;gap:.75rem;">
<div class="form-group"><label>客戶姓名</label><input id="e_customerName" value="${esc(c.customerName)}" style="width:100%;padding:.6rem;border:2px solid #e8edf2;border-radius:8px;"></div>
<div class="form-group"><label>聯絡方式</label><input id="e_contactInfo" value="${esc(c.contactInfo)}" style="width:100%;padding:.6rem;border:2px solid #e8edf2;border-radius:8px;"></div>
</div>`;
    document.getElementById('editModalBody').innerHTML = html;
    setTimeout(()=>{
      document.getElementById('editSaveBtn').onclick=()=>saveEdit(c);
      document.getElementById('editModal').classList.add('active');
      showToast('進入編輯');
    },100);
  }catch(err){
    showToast('編輯載入失敗');
    console.error(err);
  }
}

function saveEdit(c){
  try{
    c.customerName = document.getElementById('e_customerName').value.trim();
    c.contactInfo = document.getElementById('e_contactInfo').value.trim();
    renderList();
    closeEdit();
    showToast('儲存成功');
  }catch(err){
    showToast('儲存失敗');
    console.error(err);
  }
}

function goAdd(){
  const newId = Date.now();
  customers.push({id:newId,customerName:'新客戶',contactInfo:'',salesPerson:currentUser});
  renderList();
  showEdit(newId);
}

function init(){
  if(!customers.length){
    customers.push({id:1,customerName:'王小姐',contactInfo:'0911111111',salesPerson:'業務A'});
    customers.push({id:2,customerName:'李先生',contactInfo:'0922222222',salesPerson:'業務B'});
  }
  renderList();
}

window.onload = init;
</script>
</body>
</html>
